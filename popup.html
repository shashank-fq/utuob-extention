<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>YouTube Enhancer</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <h2>YouTube Enhancer</h2>

  <!-- Zoom Controls -->
  <label>Home Zoom</label>
  <select id="homeZoom">
    <option value="100">100%</option>
    <option value="80">80%</option>
    <option value="75">75%</option>
    <option value="60">60%</option>
  </select>

  <label>Watch Zoom</label>
  <select id="watchZoom">
    <option value="125">125%</option>
    <option value="110">110%</option>
    <option value="100">100%</option>
    <option value="80">80%</option>
  </select>

  <!-- Toggles -->
  <label><input type="checkbox" id="hideShorts" /> Hide Shorts</label>
  <label><input type="checkbox" id="autoTheater" /> Auto Theater Mode</label>
  <label><input type="checkbox" id="hoverExpand" /> Hover Expand Description</label>
  <label><input type="checkbox" id="studyMode" /> Smart Study Mode</label>


  <button id="saveBtn">Save Settings</button>

  <script src="popup.js"></script>
</body>
</html>
